# Loc Sentinel — Slack app manifest (Socket Mode, no public URL needed).
# Paste this when creating the app: https://api.slack.com/apps → Create New App
# → "From an app manifest" → pick your workspace → paste → Create.
# Full walkthrough in SLACK_SETUP.md.
display_information:
  name: Loc Sentinel
  description: A ~99% automated localization pipeline with one human review in Slack.
  background_color: "#1f2d3d"

features:
  bot_user:
    display_name: loc-sentinel
    always_online: true
  slash_commands:
    - command: /loc
      description: Localization self-serve — coverage, untranslated, requests, status
      usage_hint: "untranslated [lang] | coverage [lang] | pending [lang] | request <text> | status [T12] | queue [lang]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - chat:write        # post + update review cards
      - commands          # /loc slash command
      - channels:read     # resolve channel info
      - groups:read       # private channel support

settings:
  # Socket Mode = interactivity over a websocket; NO request URL to host.
  socket_mode_enabled: true
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
